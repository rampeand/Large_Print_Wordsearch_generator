name: Docker Build, Test, and Push

# This workflow runs on every push to the main branch.
on:
  push:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for testing
        run: docker build . --tag test-image:latest

      - name: Run container for testing
        run: docker run -d --name test-container -p 8080:80 test-image:latest

      - name: Test container accessibility
        # Give the container a moment to start up, then test with curl.
        # The --fail flag causes curl to exit with an error if the HTTP request fails.
        run: sleep 10 && curl --fail http://localhost:8080
      
      - name: Log in to Docker Hub
        # IMPORTANT: You must configure these secrets in your GitHub repository settings.
        # Go to Settings > Secrets and variables > Actions > New repository secret
        # DOCKERHUB_USERNAME: Your Docker Hub username.
        # DOCKERHUB_TOKEN: An access token from your Docker Hub account.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image to Docker Hub
        # The image is tagged with your Docker Hub username and the repository name.
        run: |
          docker tag test-image:latest ${{ secrets.DOCKERHUB_USERNAME }}/large-print-wordsearch-generator:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/large-print-wordsearch-generator:latest
